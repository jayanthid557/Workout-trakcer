<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Workout Tracker</title>
<style>
  :root{
    --bg: #0A0E14;
    --surface: #12181F;
    --surface-2: #1A222B;
    --line: #232C36;
    --text: #EAF0F6;
    --text-dim: #8A96A3;
    --accent: #3B82F6;
    --accent-dim: #3B82F633;
    --pr: #F5A623;
    --danger: #EF4444;
    --radius: 14px;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
    --sans: -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    height:100%; -webkit-tap-highlight-color:transparent;
  }
  #app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}
  .screen{flex:1; padding:20px 16px 90px; overflow-y:auto;}
  .hidden{display:none !important;}

  /* Header */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .brand{font-size:22px; font-weight:800; letter-spacing:-0.5px;}
  .brand span{color:var(--accent);}
  .streak-chip{display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:6px 12px; font-size:13px; font-weight:600;}

  h2.section-title{font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin:22px 0 10px; font-weight:700;}
  h2.section-title:first-child{margin-top:0;}

  /* Cards */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px;}
  .card-row{display:flex; align-items:center; justify-content:space-between;}
  .btn{
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:12px 18px; font-weight:700; font-size:14px; cursor:pointer;
    transition:opacity .15s;
  }
  .btn:active{opacity:.7;}
  .btn.secondary{background:var(--surface-2); color:var(--text); border:1px solid var(--line);}
  .btn.danger{background:var(--danger);}
  .btn.block{width:100%; text-align:center;}
  .btn.small{padding:8px 12px; font-size:12px;}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text-dim);}

  /* Today workout hero */
  .hero{background:linear-gradient(160deg, var(--surface), var(--surface-2)); border:1px solid var(--line); border-radius:18px; padding:20px; margin-bottom:16px;}
  .hero-label{font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-weight:700;}
  .hero-title{font-size:26px; font-weight:800; margin:6px 0 4px; letter-spacing:-0.5px;}
  .hero-sub{color:var(--text-dim); font-size:14px; margin-bottom:14px;}
  .hero-actions{display:flex; gap:10px;}

  /* Exercise item */
  .ex-item{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px;}
  .ex-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .ex-name{font-weight:700; font-size:15px; word-break:break-word; max-width:70%;}
  .ex-target{color:var(--text-dim); font-size:12px; font-family:var(--mono);}
  .set-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .set-num{width:22px; font-family:var(--mono); color:var(--text-dim); font-size:13px;}
  .set-input{
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); font-family:var(--mono); font-size:15px; font-weight:700;
    padding:8px; width:64px; text-align:center;
  }
  .set-input:focus{outline:none; border-color:var(--accent);}
  .set-unit{font-size:11px; color:var(--text-dim); width:26px;}
  .check-btn{
    width:32px; height:32px; border-radius:50%; border:1.5px solid var(--line);
    background:transparent; margin-left:auto; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:14px;
  }
  .check-btn.done{background:var(--accent); border-color:var(--accent); color:#fff;}
  .pr-flag{color:var(--pr); font-size:11px; font-weight:700; margin-left:8px;}
  .add-set-link{color:var(--accent); font-size:13px; font-weight:600; cursor:pointer; margin-top:4px; display:inline-block;}

  /* Bottom nav */
  .navbar{
    position:sticky; bottom:0; left:0; right:0; background:rgba(10,14,20,.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); display:flex; padding:8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--text-dim); font-size:11px; font-weight:600; cursor:pointer; padding:6px 0;}
  .nav-btn.active{color:var(--accent);}
  .nav-icon{font-size:19px;}

  /* Plan cards */
  .plan-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px; cursor:pointer;}
  .plan-tag{display:inline-block; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-dim); padding:3px 8px; border-radius:6px; margin-bottom:8px;}
  .plan-name{font-size:17px; font-weight:800; margin-bottom:4px;}
  .plan-desc{color:var(--text-dim); font-size:13px; line-height:1.4;}
  .plan-active-badge{font-size:11px; color:var(--accent); font-weight:700;}

  /* Modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .modal{background:var(--surface); border-top:1px solid var(--line); border-radius:20px 20px 0 0; padding:20px 16px 30px; width:100%; max-width:480px; max-height:80vh; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-handle{width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto 16px;}
  .modal h3{font-size:19px; font-weight:800; margin-bottom:4px;}
  .modal .sub{color:var(--text-dim); font-size:13px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    color:var(--text); padding:11px; font-size:14px; font-family:var(--sans);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .tip-item{background:var(--surface-2); border-radius:10px; padding:12px; margin-bottom:8px; font-size:13px; line-height:1.5;}
  .tip-cat{font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px;}
  .day-pill-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .day-pill{background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:12px; font-weight:600; cursor:pointer; color:var(--text-dim);}
  .day-pill.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .close-x{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer;}

  .empty-state{text-align:center; padding:40px 20px; color:var(--text-dim);}
  .empty-state .big{font-size:34px; margin-bottom:10px;}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .stat-box{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px;}
  .stat-num{font-family:var(--mono); font-size:26px; font-weight:800;}
  .stat-label{font-size:12px; color:var(--text-dim); margin-top:2px;}

  .pr-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);}
  .pr-row:last-child{border-bottom:none;}
  .pr-ex{font-weight:600; font-size:14px;}
  .pr-val{font-family:var(--mono); font-weight:800; color:var(--pr); font-size:15px;}

  .timer-display{font-family:var(--mono); font-size:52px; font-weight:800; text-align:center; margin:14px 0; letter-spacing:1px;}
  .timer-opts{display:flex; gap:8px; justify-content:center; margin-bottom:16px;}

  .accent-dot{width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .accent-dot.selected{border-color:#fff;}
  .accent-row{display:flex; gap:10px; margin-top:6px;}

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:10px 18px; font-size:13px; font-weight:600;
    z-index:100; opacity:0; transition:opacity .25s, bottom .25s;
  }
  .toast.show{opacity:1; bottom:100px;}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen-home"></div>
  <div class="screen hidden" id="screen-plans"></div>
  <div class="screen hidden" id="screen-log"></div>
  <div class="screen hidden" id="screen-progress"></div>

  <div class="navbar">
    <button class="nav-btn active" data-tab="home"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn" data-tab="plans"><span class="nav-icon">📋</span>Plans</button>
    <button class="nav-btn" data-tab="log"><span class="nav-icon">✅</span>Log</button>
    <button class="nav-btn" data-tab="progress"><span class="nav-icon">📈</span>Progress</button>
  </div>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- DATA: PRESETS ---------------- */
const PRESETS = [
  {
    id:'preset-iron', name:'Iron Discipline', tag:'Strength', builtin:true,
    desc:'Disciplined 3-day strength split. Heavy compounds, low reps, total control over the bar.',
    days:[
      {label:'Push', exercises:[
        {name:'Bench Press', sets:4, reps:'5'},
        {name:'Overhead Press', sets:3, reps:'6'},
        {name:'Weighted Dips', sets:3, reps:'8'},
        {name:'Triceps Pushdown', sets:3, reps:'12'}]},
      {label:'Pull', exercises:[
        {name:'Deadlift', sets:4, reps:'5'},
        {name:'Barbell Row', sets:4, reps:'8'},
        {name:'Lat Pulldown', sets:3, reps:'10'},
        {name:'Barbell Curl', sets:3, reps:'10'}]},
      {label:'Legs', exercises:[
        {name:'Back Squat', sets:4, reps:'5'},
        {name:'Walking Lunge', sets:3, reps:'10'},
        {name:'Leg Press', sets:3, reps:'12'},
        {name:'Calf Raise', sets:4, reps:'15'}]}
    ],
    diet:['High protein: ~1g per lb bodyweight daily.','Carb-cycle: more carbs on lifting days, fewer on rest days.','Prioritize sleep — strength adaptations happen overnight.'],
    stretch:['Hip flexor stretch, 60s each side, post-leg day.','Shoulder dislocates with a band before Push day.','Thoracic spine rotations before Pull day.']
  },
  {
    id:'preset-shadow', name:'Shadow Physique', tag:'Lean / Agile', builtin:true,
    desc:'Fast, lean, explosive. Bodyweight and conditioning focused — built for speed and control.',
    days:[
      {label:'Full Body Flow', exercises:[
        {name:'Pull-ups', sets:4, reps:'8'},
        {name:'Push-ups', sets:4, reps:'15'},
        {name:'Kettlebell Swing', sets:3, reps:'15'},
        {name:'Sprint Intervals', sets:6, reps:'20s'}]},
      {label:'Core & Mobility', exercises:[
        {name:'Plank', sets:3, reps:'45s'},
        {name:'Hanging Leg Raise', sets:3, reps:'12'},
        {name:'Turkish Get-up', sets:3, reps:'6'},
        {name:'Cossack Squat', sets:3, reps:'10'}]},
      {label:'Explosive', exercises:[
        {name:'Box Jump', sets:4, reps:'6'},
        {name:'Battle Ropes', sets:5, reps:'30s'},
        {name:'Burpees', sets:4, reps:'12'},
        {name:'Broad Jump', sets:3, reps:'5'}]}
    ],
    diet:['Lean protein sources: chicken, fish, tofu, egg whites.','Keep added sugar low, favor complex carbs pre-workout.','Hydrate — agility work costs more fluid than you think.'],
    stretch:['Dynamic leg swings before explosive days.','Foam roll calves and IT band post-sprint work.','90/90 hip stretch for mobility between sessions.']
  },
  {
    id:'preset-titan', name:'Titan Build', tag:'Mass Bulk', builtin:true,
    desc:'Maximum size. High volume, progressive overload, built for a caloric surplus.',
    days:[
      {label:'Chest & Back', exercises:[
        {name:'Bench Press', sets:4, reps:'8'},
        {name:'Incline Dumbbell Press', sets:3, reps:'10'},
        {name:'Barbell Row', sets:4, reps:'8'},
        {name:'Lat Pulldown', sets:3, reps:'12'}]},
      {label:'Legs', exercises:[
        {name:'Back Squat', sets:4, reps:'8'},
        {name:'Romanian Deadlift', sets:3, reps:'10'},
        {name:'Leg Extension', sets:3, reps:'12'},
        {name:'Calf Raise', sets:4, reps:'15'}]},
      {label:'Arms & Shoulders', exercises:[
        {name:'Overhead Press', sets:4, reps:'8'},
        {name:'Barbell Curl', sets:3, reps:'10'},
        {name:'Skullcrusher', sets:3, reps:'10'},
        {name:'Lateral Raise', sets:3, reps:'15'}]}
    ],
    diet:['Caloric surplus: +300–500 kcal above maintenance.','High protein and carbs — fuel every session fully.','Track bodyweight weekly, adjust intake if stalled.'],
    stretch:['Static stretch each muscle group post-session, 30s hold.','Light cardio warm-up before heavy leg days.','Wrist and forearm stretches after arm day.']
  },
  {
    id:'preset-shonen', name:'Lean Shonen', tag:'Athletic Lean Bulk', builtin:true,
    desc:'Athletic build with visible definition — moderate surplus, functional strength and conditioning mixed in.',
    days:[
      {label:'Upper Body', exercises:[
        {name:'Pull-ups', sets:4, reps:'10'},
        {name:'Push Press', sets:3, reps:'8'},
        {name:'Cable Row', sets:3, reps:'12'},
        {name:'Dips', sets:3, reps:'12'}]},
      {label:'Lower Body', exercises:[
        {name:'Front Squat', sets:4, reps:'8'},
        {name:'Romanian Deadlift', sets:3, reps:'10'},
        {name:'Step-ups', sets:3, reps:'12'}]},
      {label:'Conditioning', exercises:[
        {name:'Jump Rope', sets:5, reps:'60s'},
        {name:'Sled Push', sets:4, reps:'20m'},
        {name:'Hanging Core Raise', sets:3, reps:'15'}]}
    ],
    diet:['Moderate surplus with a 40/30/30 protein/carb/fat split.','Time carbs around training for energy and recovery.','Add a daily veggie serving for micronutrients.'],
    stretch:['Yoga flow (10 min) on rest days for full-body mobility.','Ankle mobility drills before lower body day.','Deep squat hold, 2 min, after conditioning.']
  }
];

/* ---------------- STATE ---------------- */
let state = {
  customPlans:[],
  activePlanId:null,
  activeCustomDays:null, // overrides plan days if user customized clone
  logs:{},        // { 'YYYY-MM-DD': { exerciseName: [{reps,weight,done}] } }
  prs:{},         // { exerciseName: maxWeight }
  measurements:[],// { date, weight, note }
  settings:{ accent:'#3B82F6', unit:'lb' },
  lastWorkoutKey:null
};
let currentTab = 'home';
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
const todayStr = () => new Date().toISOString().slice(0,10);
const dayIndex = () => new Date().getDay(); // 0 Sun..6 Sat

function findPlanById(id){
  return PRESETS.find(p=>p.id===id) || state.customPlans.find(p=>p.id===id);
}
function activePlan(){
  return state.activePlanId ? findPlanById(state.activePlanId) : null;
}
function todaysDay(plan){
  if(!plan) return null;
  return plan.days[dayIndex() % plan.days.length];
}

/* ---------------- STORAGE ---------------- */
async function loadState(){
  try{
    const raw = localStorage.getItem('forge-state');
    if(raw) state = Object.assign(state, JSON.parse(raw));
  }catch(e){ console.error('load failed', e); }
}
async function saveState(){
  try{ localStorage.setItem('forge-state', JSON.stringify(state)); }
  catch(e){ console.error('save failed', e); }
}
function applyAccent(){
  document.documentElement.style.setProperty('--accent', state.settings.accent);
  document.documentElement.style.setProperty('--accent-dim', state.settings.accent+'33');
}

/* ---------------- TOAST ---------------- */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------------- STREAK ---------------- */
function computeStreak(){
  let streak = 0;
  let d = new Date();
  let firstDay = true;
  while(true){
    const key = d.toISOString().slice(0,10);
    const day = state.logs[key];
    const hasCompleted = day && Object.values(day).some(sets=>sets.some(s=>s.done));
    if(hasCompleted){ streak++; d.setDate(d.getDate()-1); firstDay=false; }
    else if(firstDay){ d.setDate(d.getDate()-1); firstDay=false; }
    else break;
  }
  return streak;
}

/* ---------------- RENDER: HOME ---------------- */
function renderHome(){
  const el = document.getElementById('screen-home');
  const plan = activePlan();
  const streak = computeStreak();
  let html = `
    <div class="topbar">
      <div class="brand">Forge<span>.</span></div>
      <div class="streak-chip">🔥 ${streak} day${streak===1?'':'s'}</div>
    </div>`;

  if(!plan){
    html += `
      <div class="empty-state">
        <div class="big">🏋️</div>
        <p style="font-weight:700; margin-bottom:6px;">No active plan yet</p>
        <p style="font-size:13px; margin-bottom:16px;">Add your own plan (or start from a sample) — Forge just tracks it.</p>
        <button class="btn" onclick="switchTab('plans')">Browse Plans</button>
      </div>`;
  } else {
    const day = todaysDay(plan);
    html += `
      <div class="hero">
        <div class="hero-label">${plan.name}</div>
        <div class="hero-title">${day.label}</div>
        <div class="hero-sub">${day.exercises.length} exercises planned for today</div>
        <div class="hero-actions">
          <button class="btn" onclick="switchTab('log')">Start Workout</button>
          <button class="btn secondary" onclick="repeatLast()">Repeat Last</button>
        </div>
      </div>`;

    html += `<h2 class="section-title">Today's Exercises</h2>`;
    day.exercises.forEach(ex=>{
      html += `<div class="card card-row"><span>${ex.name}</span><span class="ex-target">${ex.sets} × ${ex.reps}</span></div>`;
    });

    html += `<h2 class="section-title">Quick Tools</h2>
      <div class="card card-row" style="cursor:pointer" onclick="openTimerModal()"><span>⏱ Rest Timer</span><span class="ex-target">Open</span></div>
      <div class="card card-row" style="cursor:pointer" onclick="openTipsModal(plan)"><span>🍎 Diet & Stretch Tips</span><span class="ex-target">View</span></div>`;
  }
  el.innerHTML = html;
}

function repeatLast(){
  if(!state.lastWorkoutKey || !state.logs[state.lastWorkoutKey]){
    toast('No previous workout found');
    return;
  }
  const src = state.logs[state.lastWorkoutKey];
  const key = todayStr();
  state.logs[key] = state.logs[key] || {};
  Object.keys(src).forEach(exName=>{
    state.logs[key][exName] = src[exName].map(s=>({reps:s.reps, weight:s.weight, done:false}));
  });
  saveState();
  toast('Loaded last workout — go to Log');
  switchTab('log');
}

/* ---------------- RENDER: PLANS ---------------- */
function renderPlans(){
  const el = document.getElementById('screen-plans');
  let html = `
    <div class="topbar">
      <div class="brand">My Plans</div>
      <button class="btn small" onclick="openCreatePlanModal()">+ Add Plan</button>
    </div>
    <h2 class="section-title">Sample Plans (edit freely)</h2>`;
  PRESETS.forEach(p=>{
    html += planCardHtml(p);
  });
  if(state.customPlans.length){
    html += `<h2 class="section-title">Your Plans</h2>`;
    state.customPlans.forEach(p=>{
      html += planCardHtml(p, true);
    });
  }
  el.innerHTML = html;
}
function planCardHtml(p, custom){
  const active = state.activePlanId === p.id;
  return `
    <div class="plan-card" onclick="openPlanPreview('${p.id}')">
      <span class="plan-tag">${escapeHtml(p.tag)}</span>
      ${active ? '<span class="plan-active-badge" style="float:right">● ACTIVE</span>' : ''}
      <div class="plan-name">${escapeHtml(p.name)}</div>
      <div class="plan-desc">${escapeHtml(p.desc)}</div>
    </div>`;
}

function openPlanPreview(id){
  const plan = findPlanById(id);
  const isCustom = state.customPlans.some(p=>p.id===id);
  const modal = document.getElementById('modal-root');
  let daysHtml = plan.days.map(d=>`
    <div class="tip-item">
      <div class="tip-cat">${d.label}</div>
      ${d.exercises.map(e=>`<div style="display:flex;justify-content:space-between;padding:3px 0;"><span>${e.name}</span><span class="ex-target">${e.sets}×${e.reps}</span></div>`).join('')}
    </div>`).join('');
  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <span class="plan-tag">${plan.tag}</span>
        <h3>${plan.name}</h3>
        <div class="sub">${plan.desc}</div>
        ${daysHtml}
        <div style="display:flex; gap:10px; margin-top:14px;">
          <button class="btn block" onclick="usePlan('${id}')">${state.activePlanId===id ? 'Currently Active' : 'Use This Plan'}</button>
        </div>
        ${state.activePlanId===id ? `<button class="btn danger block" style="margin-top:10px" onclick="discontinuePlan()">Discontinue Plan</button>` : ''}
        ${isCustom ? `<button class="btn ghost block" style="margin-top:10px" onclick="editCustomPlan('${id}')">Edit Plan</button><button class="btn danger block" style="margin-top:10px" onclick="deletePlan('${id}')">Delete Plan</button>` : `<button class="btn ghost block" style="margin-top:10px" onclick="clonePreset('${id}')">Clone & Customize</button>`}
      </div>
    </div>`;
}
function deletePlan(id){
  if(!confirm('Delete this plan? This cannot be undone.')) return;
  state.customPlans = state.customPlans.filter(p=>p.id!==id);
  if(state.activePlanId===id) state.activePlanId=null;
  saveState();
  toast('Plan deleted');
  closeModal();
  renderPlans();
}
function discontinuePlan(){
  state.activePlanId = null;
  saveState();
  toast('Plan discontinued');
  closeModal();
  switchTab('home');
}
function usePlan(id){
  state.activePlanId = id;
  saveState();
  toast('Plan activated');
  closeModal();
  switchTab('home');
}
function clonePreset(id){
  const src = findPlanById(id);
  const clone = JSON.parse(JSON.stringify(src));
  clone.id = 'custom-'+Date.now();
  clone.builtin = false;
  clone.name = src.name + ' (My Version)';
  state.customPlans.push(clone);
  saveState();
  toast('Cloned to Your Plans — edit it now');
  closeModal();
  editCustomPlan(clone.id);
}
function openCreatePlanModal(){
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <h3>New Plan</h3>
        <div class="sub">Start from scratch — add days and exercises after.</div>
        <div class="field"><label>Plan Name</label><input id="new-plan-name" placeholder="e.g. My Summer Cut"></div>
        <div class="field"><label>Category / Tag</label><input id="new-plan-tag" placeholder="e.g. Custom"></div>
        <div class="field"><label>Exercises (one per line: Name - Sets x Reps)</label>
          <textarea id="new-plan-paste" rows="5" placeholder="Bench Press - 4x8
Squat - 3x10
Barbell Row - 3x8"></textarea>
        </div>
        <button class="btn block" onclick="createPlan()">Create Plan</button>
      </div>
    </div>`;
}
function createPlan(){
  const name = document.getElementById('new-plan-name').value.trim() || 'My Plan';
  const tag = document.getElementById('new-plan-tag').value.trim() || 'Custom';
  const pasteText = document.getElementById('new-plan-paste').value.trim();
  let exercises = [];
  if(pasteText){
    pasteText.split('\n').forEach(line=>{
      line = line.trim();
      if(!line) return;
      const m = line.match(/^(.+?)\s*-\s*(\d+)\s*x\s*(.+)$/i);
      if(m){ exercises.push({name:m[1].trim(), sets:parseInt(m[2]), reps:m[3].trim()}); }
      else { exercises.push({name:line, sets:3, reps:'10'}); }
    });
  }
  const plan = {id:'custom-'+Date.now(), name, tag, desc:'Custom plan.', builtin:false,
    days:[{label:'Day 1', exercises}], diet:[], stretch:[]};
  state.customPlans.push(plan);
  saveState();
  closeModal();
  editCustomPlan(plan.id);
}
function editCustomPlan(id){
  const plan = state.customPlans.find(p=>p.id===id);
  if(!plan) return;
  window._editingPlanId = id;
  window._editingDayIdx = 0;
  renderEditPlanModal();
}
function renderEditPlanModal(){
  const plan = state.customPlans.find(p=>p.id===window._editingPlanId);
  const dayIdx = window._editingDayIdx;
  const day = plan.days[dayIdx];
  const modal = document.getElementById('modal-root');
  const pills = plan.days.map((d,i)=>`<span class="day-pill ${i===dayIdx?'active':''}" onclick="window._editingDayIdx=${i}; renderEditPlanModal()">${d.label}</span>`).join('')
    + `<span class="day-pill" onclick="addDay()">+ Add Day</span>`;
  const exList = day.exercises.map((ex,i)=>`
    <div class="card-row" style="margin-bottom:8px;">
      <span>${ex.name} <span class="ex-target">${ex.sets}×${ex.reps}</span></span>
      <button class="btn ghost small" onclick="removeExercise(${dayIdx},${i})">Remove</button>
    </div>`).join('') || '<p style="color:var(--text-dim); font-size:13px;">No exercises yet.</p>';

  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <h3>${plan.name}</h3>
        <div class="sub">Tap a day, add exercises, save.</div>
        <div class="day-pill-row">${pills}</div>
        ${exList}
        <div class="field" style="margin-top:14px;"><label>Exercise Name</label><input id="ex-name" placeholder="e.g. Barbell Squat"></div>
        <div style="display:flex; gap:8px;">
          <div class="field" style="flex:1"><label>Sets</label><input id="ex-sets" type="number" value="3"></div>
          <div class="field" style="flex:1"><label>Reps</label><input id="ex-reps" value="10"></div>
        </div>
        <button class="btn secondary block" onclick="addExercise()">+ Add Exercise</button>
        <button class="btn block" style="margin-top:12px" onclick="finishEditPlan()">Save Plan</button>
      </div>
    </div>`;
}
function addDay(){
  const plan = state.customPlans.find(p=>p.id===window._editingPlanId);
  plan.days.push({label:'Day '+(plan.days.length+1), exercises:[]});
  window._editingDayIdx = plan.days.length-1;
  renderEditPlanModal();
}
function addExercise(){
  const plan = state.customPlans.find(p=>p.id===window._editingPlanId);
  const name = document.getElementById('ex-name').value.trim();
  if(!name){ toast('Enter an exercise name'); return; }
  const sets = parseInt(document.getElementById('ex-sets').value) || 3;
  const reps = document.getElementById('ex-reps').value.trim() || '10';
  plan.days[window._editingDayIdx].exercises.push({name, sets, reps});
  renderEditPlanModal();
}
function removeExercise(dayIdx, exIdx){
  const plan = state.customPlans.find(p=>p.id===window._editingPlanId);
  plan.days[dayIdx].exercises.splice(exIdx,1);
  renderEditPlanModal();
}
function finishEditPlan(){
  saveState();
  toast('Plan saved');
  closeModal();
  renderPlans();
}

/* ---------------- RENDER: LOG ---------------- */
function renderLog(){
  const el = document.getElementById('screen-log');
  const plan = activePlan();
  const key = todayStr();
  if(!plan){
    el.innerHTML = `<div class="topbar"><div class="brand">Log</div></div>
      <div class="empty-state"><div class="big">📋</div><p style="font-weight:700;">No active plan</p><p style="font-size:13px;">Choose a plan first.</p></div>`;
    return;
  }
  const day = todaysDay(plan);
  state.logs[key] = state.logs[key] || {};
  let html = `<div class="topbar"><div class="brand">${day.label}</div><button class="btn small" onclick="openTimerModal()">⏱ Timer</button></div>`;

  day.exercises.forEach(ex=>{
    state.logs[key][ex.name] = state.logs[key][ex.name] || Array.from({length:ex.sets}, ()=>({reps:'', weight:'', done:false}));
    const sets = state.logs[key][ex.name];
    const pr = state.prs[ex.name];
    html += `<div class="ex-item">
      <div class="ex-head">
        <span class="ex-name">${escapeHtml(ex.name)}</span>
        <span class="ex-target">target ${ex.sets}×${ex.reps}</span>
      </div>`;
    sets.forEach((s,i)=>{
      const isPR = s.done && s.weight && (!pr || parseFloat(s.weight) > pr);
      html += `<div class="set-row">
        <span class="set-num">${i+1}</span>
        <input class="set-input" type="number" placeholder="${ex.reps}" value="${s.reps}" oninput="updateSet('${ex.name}',${i},'reps',this.value)">
        <span class="set-unit">reps</span>
        <input class="set-input" type="number" placeholder="0" value="${s.weight}" oninput="updateSet('${ex.name}',${i},'weight',this.value)">
        <span class="set-unit">${state.settings.unit}</span>
        <button class="check-btn ${s.done?'done':''}" onclick="toggleSet('${ex.name}',${i})">✓</button>
        ${isPR ? '<span class="pr-flag">🔥 PR</span>' : ''}
      </div>`;
    });
    html += `<span class="add-set-link" onclick="addSet('${ex.name}')">+ Add Set</span>
    </div>`;
  });
  el.innerHTML = html;
}
function updateSet(exName, idx, field, value){
  const key = todayStr();
  if(field==='weight' || field==='reps'){
    const num = parseFloat(value);
    if(value !== '' && (isNaN(num) || num < 0)) return; // reject invalid/negative
  }
  state.logs[key][exName][idx][field] = value;
  state.lastWorkoutKey = key;
  if(field==='weight' && value){
    const w = parseFloat(value);
    if(!isNaN(w) && (!state.prs[exName] || w > state.prs[exName])){
      state.prs[exName] = w;
      toast('🔥 New PR: '+exName+' — '+w+' '+state.settings.unit);
      renderLog();
    }
  }
  saveState();
}
function toggleSet(exName, idx){
  const key = todayStr();
  const s = state.logs[key][exName][idx];
  s.done = !s.done;
  if(s.done && s.weight){
    const w = parseFloat(s.weight);
    if(!state.prs[exName] || w > state.prs[exName]){
      state.prs[exName] = w;
      toast('🔥 New PR: '+exName+' — '+w+' '+state.settings.unit);
    }
  }
  state.lastWorkoutKey = key;
  saveState();
  renderLog();
}
function addSet(exName){
  const key = todayStr();
  state.logs[key][exName].push({reps:'', weight:'', done:false});
  saveState();
  renderLog();
}

/* ---------------- RENDER: PROGRESS ---------------- */
function renderProgress(){
  const el = document.getElementById('screen-progress');
  const streak = computeStreak();
  const totalSessions = Object.keys(state.logs).filter(k=>{
    const day = state.logs[k];
    return Object.values(day).some(sets=>sets.some(s=>s.done));
  }).length;
  const prEntries = Object.entries(state.prs);

  let html = `<div class="topbar"><div class="brand">Progress</div></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${streak}</div><div class="stat-label">Day Streak</div></div>
      <div class="stat-box"><div class="stat-num">${totalSessions}</div><div class="stat-label">Sessions Logged</div></div>
    </div>
    <h2 class="section-title">Personal Records</h2>`;
  if(prEntries.length===0){
    html += `<div class="card" style="color:var(--text-dim); font-size:13px;">No PRs yet — complete a set with weight logged to start tracking.</div>`;
  } else {
    html += `<div class="card">` + prEntries.map(([name,w])=>`<div class="pr-row"><span class="pr-ex">${name}</span><span class="pr-val">${w} ${state.settings.unit}</span></div>`).join('') + `</div>`;
  }

  html += `<h2 class="section-title">Body Measurements</h2>
    <div class="card">
      ${state.measurements.length===0 ? '<p style="color:var(--text-dim); font-size:13px; margin-bottom:10px;">No entries yet.</p>' : state.measurements.slice().reverse().map(m=>`<div class="pr-row"><span class="pr-ex">${m.date}</span><span class="pr-val">${m.weight} ${state.settings.unit}</span></div>`).join('')}
    </div>
    <button class="btn secondary block" onclick="openAddMeasurement()">+ Log Bodyweight</button>

    <div class="card">
      <label style="font-size:13px; font-weight:600; display:block; margin-bottom:8px;">Weight Unit</label>
      <div style="display:flex; gap:8px;">
        <button class="btn ${state.settings.unit==='lb'?'':'secondary'} small" onclick="setUnit('lb')">lb</button>
        <button class="btn ${state.settings.unit==='kg'?'':'secondary'} small" onclick="setUnit('kg')">kg</button>
      </div>
    </div>
    <h2 class="section-title">Appearance</h2>
    <div class="card">
      <label style="font-size:13px; font-weight:600; display:block; margin-bottom:8px;">Accent Color</label>
      <div class="accent-row">
        ${['#3B82F6','#EF4444','#8B5CF6','#22C55E','#F59E0B'].map(c=>`<div class="accent-dot ${state.settings.accent===c?'selected':''}" style="background:${c}" onclick="setAccent('${c}')"></div>`).join('')}
      </div>
    </div>`;
  el.innerHTML = html;
}
function setUnit(u){
  state.settings.unit = u;
  saveState();
  renderProgress();
}
function setAccent(c){
  state.settings.accent = c;
  applyAccent();
  saveState();
  renderProgress();
}
function openAddMeasurement(){
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <h3>Log Bodyweight</h3>
        <div class="field"><label>Weight (lb)</label><input id="mw-weight" type="number" placeholder="e.g. 165"></div>
        <button class="btn block" onclick="saveMeasurement()">Save</button>
      </div>
    </div>`;
}
function saveMeasurement(){
  const w = document.getElementById('mw-weight').value;
  if(!w){ toast('Enter a weight'); return; }
  state.measurements.push({date:todayStr(), weight:w});
  saveState();
  closeModal();
  renderProgress();
}

/* ---------------- TIMER ---------------- */
let timerInterval = null;
function openTimerModal(){
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <h3>Rest Timer</h3>
        <div class="timer-display" id="timer-display">60</div>
        <div class="timer-opts">
          <button class="btn secondary small" onclick="startTimer(30)">30s</button>
          <button class="btn secondary small" onclick="startTimer(60)">60s</button>
          <button class="btn secondary small" onclick="startTimer(90)">90s</button>
          <button class="btn secondary small" onclick="startTimer(120)">120s</button>
        </div>
        <button class="btn ghost block" onclick="stopTimer()">Stop</button>
      </div>
    </div>`;
}
function startTimer(sec){
  clearInterval(timerInterval);
  let remaining = sec;
  const disp = document.getElementById('timer-display');
  disp.textContent = remaining;
  timerInterval = setInterval(()=>{
    remaining--;
    if(document.getElementById('timer-display')) document.getElementById('timer-display').textContent = remaining;
    if(remaining<=0){ clearInterval(timerInterval); toast('⏱ Rest complete'); }
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); closeModal(); }

/* ---------------- TIPS MODAL ---------------- */
function openTipsModal(plan){
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-handle"></div>
        <button class="close-x" onclick="closeModal()">✕</button>
        <h3>${plan.name} — Tips</h3>
        <div class="sub">Diet</div>
        ${(plan.diet||[]).map(t=>`<div class="tip-item">${t}</div>`).join('') || '<p style="font-size:13px;color:var(--text-dim)">No diet tips added.</p>'}
        <div class="sub" style="margin-top:14px;">Stretching</div>
        ${(plan.stretch||[]).map(t=>`<div class="tip-item">${t}</div>`).join('') || '<p style="font-size:13px;color:var(--text-dim)">No stretch tips added.</p>'}
      </div>
    </div>`;
}

function closeModal(){ document.getElementById('modal-root').innerHTML = ''; clearInterval(timerInterval); }

/* ---------------- NAV ---------------- */
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById('screen-'+tab).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='home') renderHome();
  if(tab==='plans') renderPlans();
  if(tab==='log') renderLog();
  if(tab==='progress') renderProgress();
}
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click', ()=>switchTab(b.dataset.tab)));

/* ---------------- INIT ---------------- */
(async function init(){
  await loadState();
  applyAccent();
  renderHome();
})();
</script>
</body>
</html>
